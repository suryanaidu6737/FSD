<!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Properties</title>

    <style>
        /* font-size */
        .size {
            font-size: 24px;
        }

        /* font-weight */
        .weight {
            font-weight: bold;
        }

        /* font-style */
        .style {
            font-style: italic;
        }

        /* text-decoration */
        .decoration {
            text-decoration: underline;
        }

        /* text-transform */
        .transform {
            text-transform: uppercase;
        }

        /* text-align */
        .align {
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>

<body>

    <h1>CSS Font and Text Properties Example</h1>

    <p class="size">This text uses font-size property.</p>

    <p class="weight">This text uses font-weight property.</p>

    <p class="style">This text uses font-style property.</p>

    <p class="decoration">This text uses text-decoration property.</p>

    <p class="transform">This text uses text-transform property.</p>

    <div class="align">
        This text uses text-align property (center alignment).
    </div>

</body>
</html>
