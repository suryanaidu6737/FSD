<!DOCTYPE html>
<html>
<head>
<title>JavaScript Input Methods</title>
</head>

<body>

<h2>Input Methods in JavaScript</h2>

Name: <input type="text" id="name">
<button onclick="showName()">Submit</button>

<p id="result"></p>

<script>

function showName(){
    var name = document.getElementById("name").value;
    document.getElementById("result").innerHTML = "Name entered: " + name;
}

var age = prompt("Enter your age:");
console.log("Age entered: " + age);

</script>

</body>
</html>
