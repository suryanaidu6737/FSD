<!DOCTYPE html>
<html>
<head>
<title>JavaScript Output Methods</title>
</head>

<body>

<h2>JavaScript Output Methods</h2>

<p id="demo"></p>

<script>

document.write("1. Output using document.write()<br>");

document.getElementById("demo").innerHTML = "2. Output using innerHTML";

console.log("3. Output using console.log()");

alert("4. Output using alert()");

</script>

</body>
</html>
