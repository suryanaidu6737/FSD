<!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript</title>

    <!-- Internal JavaScript -->
    <script>
        function showInternal() {
            alert("This is Internal JavaScript");
        }
    </script>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</head>
<body>

    <h2>Embedding JavaScript Example</h2>

    <!-- Button for Internal JS -->
    <button onclick="showInternal()">Internal JavaScript</button>

    <br><br>

    <!-- Button for External JS -->
    <button onclick="showExternal()">External JavaScript</button>

</body>
</html>
